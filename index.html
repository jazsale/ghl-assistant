<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GHL AI Assistant — Sale Signature Homes</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0a0a0f; --surface: #12121a; --surface2: #1a1a26;
    --border: #2a2a3a; --accent: #6c63ff; --accent2: #ff6584;
    --accent3: #43e97b; --text: #e8e8f0; --muted: #6b6b80;
  }
  html, body { height: 100%; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; display: flex; flex-direction: column; overflow: hidden; }
  .header { padding: 14px 24px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .logo { width: 36px; height: 36px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 11px; color: white; }
  .header-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; color: var(--text); }
  .header-sub { font-size: 10px; color: var(--muted); margin-top: 1px; }
  .status-pill { display: flex; align-items: center; gap: 6px; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 5px 12px; font-size: 11px; color: var(--muted); }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #444; transition: all 0.3s; }
  .status-dot.on { background: var(--accent3); box-shadow: 0 0 6px var(--accent3); }
  .setup { background: linear-gradient(135deg, rgba(108,99,255,0.1), rgba(255,101,132,0.05)); border-bottom: 1px solid rgba(108,99,255,0.2); padding: 12px 24px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; flex-shrink: 0; }
  .setup input { flex: 1; min-width: 150px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 12px; outline: none; transition: border-color 0.2s; }
  .setup input:focus { border-color: var(--accent); }
  .setup input::placeholder { color: var(--muted); }
  .setup-btn { background: var(--accent); color: white; border: none; border-radius: 8px; padding: 8px 18px; font-family: 'Syne', sans-serif; font-weight: 600; font-size: 12px; cursor: pointer; white-space: nowrap; transition: opacity 0.2s; }
  .setup-btn:hover { opacity: 0.85; }
  .setup-label { font-size: 11px; color: var(--muted); white-space: nowrap; }
  .quick { padding: 10px 24px; display: flex; gap: 8px; flex-wrap: wrap; border-bottom: 1px solid var(--border); flex-shrink: 0; background: var(--surface); }
  .qbtn { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); border-radius: 20px; padding: 5px 12px; font-size: 11px; font-family: 'DM Mono', monospace; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
  .qbtn:hover { border-color: var(--accent); color: var(--accent); background: rgba(108,99,255,0.08); }
  .messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; scroll-behavior: smooth; }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .msg { display: flex; gap: 12px; animation: up 0.3s ease; max-width: 85%; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.ai { align-self: flex-start; }
  @keyframes up { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  .av { width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; margin-top: 2px; }
  .av.ai { background: linear-gradient(135deg, var(--accent), var(--accent2)); font-family: 'Syne', sans-serif; font-weight: 800; color: white; font-size: 10px; }
  .av.user { background: var(--surface2); border: 1px solid var(--border); }
  .bubble { padding: 12px 16px; border-radius: 14px; font-size: 13px; line-height: 1.65; max-width: 100%; white-space: pre-wrap; word-break: break-word; }
  .msg.user .bubble { background: #1e1e30; border: 1px solid var(--border); border-top-right-radius: 4px; }
  .msg.ai .bubble { background: #16162a; border: 1px solid rgba(108,99,255,0.2); border-top-left-radius: 4px; }
  .atag { display: inline-block; background: rgba(67,233,123,0.1); border: 1px solid rgba(67,233,123,0.3); color: var(--accent3); border-radius: 4px; padding: 1px 6px; font-size: 10px; margin-bottom: 6px; letter-spacing: 0.5px; }
  .typing { display: flex; gap: 4px; align-items: center; padding: 14px 16px; }
  .typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: bounce 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100% { transform:translateY(0); opacity:0.4; } 30% { transform:translateY(-5px); opacity:1; } }
  .input-area { padding: 14px 24px; background: var(--surface); border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0; }
  .input-wrap { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 12px; display: flex; align-items: flex-end; transition: border-color 0.2s; }
  .input-wrap:focus-within { border-color: var(--accent); }
  textarea { flex: 1; background: transparent; border: none; outline: none; color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px; padding: 12px 14px; resize: none; max-height: 120px; line-height: 1.5; }
  textarea::placeholder { color: var(--muted); }
  .send { width: 38px; height: 38px; background: var(--accent); border: none; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: opacity 0.2s; flex-shrink: 0; margin: 6px 6px 6px 0; }
  .send:hover { opacity: 0.85; }
  .send:disabled { opacity: 0.3; cursor: not-allowed; }
  .send svg { width: 16px; height: 16px; fill: white; }
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <div class="logo">GHL</div>
    <div>
      <div class="header-title">GHL AI Assistant</div>
      <div class="header-sub">Sale Signature Homes · Powered by Claude</div>
    </div>
  </div>
  <div class="status-pill">
    <div class="status-dot" id="dot"></div>
    <span id="statusTxt">Not connected</span>
  </div>
</div>
<div class="setup">
  <span class="setup-label">Connect</span>
  <input type="password" id="ghlKey" placeholder="GHL Private Integration key..." />
  <input type="text" id="locId" placeholder="Location ID..." style="max-width:220px" />
  <input type="password" id="claudeKey" placeholder="Anthropic API key..." style="max-width:220px" />
  <button class="setup-btn" onclick="connect()">Connect →</button>
</div>
<div class="quick">
  <button class="qbtn" onclick="q('Review all my current active workflows and messaging sequences. List everything that is set up.')">📋 Review Workflows</button>
  <button class="qbtn" onclick="q('List all my active funnels and landing pages')">🔀 Funnels</button>
  <button class="qbtn" onclick="q('How many contacts do I have and show me the most recent ones')">👥 Contacts</button>
  <button class="qbtn" onclick="q('Show me my pipelines and opportunity counts')">🎯 Pipelines</button>
  <button class="qbtn" onclick="q('Give me a full summary of my GHL account')">📊 Account Summary</button>
  <button class="qbtn" onclick="q('What calendars do I have and how are they set up?')">📅 Calendars</button>
</div>
<div class="messages" id="msgs">
  <div class="msg ai">
    <div class="av ai">AI</div>
    <div class="bubble">Hey Jaz! Your GHL AI Assistant is ready.

Paste your three keys above and hit Connect — then tell me what you need done in plain English.

🔒 Keys stay in this browser tab only. Never stored anywhere.</div>
  </div>
</div>
<div class="input-area">
  <div class="input-wrap">
    <textarea id="inp" placeholder="Tell me what you need done in GHL..." rows="1"
      onkeydown="handleKey(event)" oninput="resize(this)" disabled></textarea>
  </div>
  <button class="send" id="sendBtn" onclick="send()" disabled>
    <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
  </button>
</div>
<script>
  let ghlKey='',locId='',claudeKey='',connected=false,loading=false,history=[];

  function connect(){
    const g=document.getElementById('ghlKey').value.trim();
    const l=document.getElementById('locId').value.trim();
    const c=document.getElementById('claudeKey').value.trim();
    if(!g||!l||!c){alert('Please fill in all three fields.');return;}
    ghlKey=g;locId=l;claudeKey=c;connected=true;
    document.getElementById('dot').className='status-dot on';
    document.getElementById('statusTxt').textContent='Connected';
    document.getElementById('inp').disabled=false;
    document.getElementById('sendBtn').disabled=false;
    addMsg('ai','🎉 Connected! Ready to work.\n\nWhat do you need me to do first?');
  }

  function q(text){
    if(!connected){alert('Connect your keys first!');return;}
    document.getElementById('inp').value=text;send();
  }

  function addMsg(role,text){
    const box=document.getElementById('msgs');
    const d=document.createElement('div');d.className='msg '+(role==='ai'?'ai':'user');
    const av=document.createElement('div');av.className='av '+(role==='ai'?'ai':'user');av.textContent=role==='ai'?'AI':'👤';
    const b=document.createElement('div');b.className='bubble';b.textContent=text;
    d.appendChild(av);d.appendChild(b);box.appendChild(d);box.scrollTop=box.scrollHeight;
  }

  function showTyping(){
    const box=document.getElementById('msgs');
    const d=document.createElement('div');d.className='msg ai';d.id='typing';
    const av=document.createElement('div');av.className='av ai';av.textContent='AI';
    const b=document.createElement('div');b.className='bubble typing';b.innerHTML='<span></span><span></span><span></span>';
    d.appendChild(av);d.appendChild(b);box.appendChild(d);box.scrollTop=box.scrollHeight;
  }

  function removeTyping(){const e=document.getElementById('typing');if(e)e.remove();}

  async function send(){
    if(!connected||loading)return;
    const inp=document.getElementById('inp');
    const text=inp.value.trim();if(!text)return;
    inp.value='';resize(inp);loading=true;
    document.getElementById('sendBtn').disabled=true;
    addMsg('user',text);
    history.push({role:'user',content:text});
    showTyping();
    const system=`You are an AI assistant managing GoHighLevel (GHL) for Jaz Sale at Sale Signature Homes and Sale Away Stays in Oklahoma City, OK. Location ID: ${locId}. You help with workflows, funnels, contacts, pipelines, calendars, SMS and email campaigns. Jaz's phone: (405) 886-9441. Website: salesignaturehomes.com. Booking: https://salesignaturehomes.com/scheduleyourfreecall. Social: @thejazsale. Be specific, action-oriented, and efficient. Jaz is busy.`;
    try{
      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':claudeKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514
',max_tokens:1024,system:system,messages:history})
      });
      if(!res.ok){const e=await res.json();throw new Error(e.error?.message||'API error '+res.status);}
      const data=await res.json();
      const reply=data.content?.[0]?.text||'No response.';
      history.push({role:'assistant',content:reply});
      removeTyping();addMsg('ai',reply);
    }catch(err){
      removeTyping();
      addMsg('ai','⚠️ Error: '+err.message+'\n\nCheck your Anthropic API key and try again.');
    }
    loading=false;document.getElementById('sendBtn').disabled=false;inp.focus();
  }

  function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}
  function resize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}
</script>
</body>
</html>
